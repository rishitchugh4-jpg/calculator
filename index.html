<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    <div class="box">
        <div class="user_val">
            <div class="nums">0</div>
        </div>
        <div class="btns">
            <div class="row row1">
                <span class="rows r1">AC</span>
                <span class="rows r1">DEL</span>
                <span class="rows r1">%</span>
                <span class="rows r1">/</span>
            </div>
            <div class="row">
                <span class="r1 a">7</span>
                <span class="r1 a">8</span>
                <span class="r1 a">9</span>
                <span class="r1  ast">*</span>
            </div>
            <div class="row">
                <span class="r1 a">4</span>
                <span class="r1 a">5</span>
                <span class="r1 a">6</span>
                <span class="r1  minus">-</span>
            </div>
            <div class="row">
                <span class="r1 a">1</span>
                <span class="r1 a">2</span>
                <span class="r1 a">3</span>
                <span class="r1  plus">+</span>
            </div>
            <div class="row">
                <span class="r1 a">00</span>
                <span class="r1 a">0</span>
                <span class="r1 a">.</span>
                <span class="r1  equals">=</span>
            </div>
        </div>
    </div> 
    <script src="calc.js"></script>   
</body>
</html>
